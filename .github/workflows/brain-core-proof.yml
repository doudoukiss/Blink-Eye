name: Brain And Embodied Proof

on:
  pull_request:
  push:
    branches:
      - main
      - master
      - "codex/**"
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * 1"

jobs:
  fast:
    name: Fast Brain-Core Lane
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install uv
        run: python -m pip install uv
      - name: Sync dev dependencies
        run: uv sync --python 3.12 --group dev
      - name: Run fast lane
        run: ./scripts/test-brain-core.sh --lane fast

  proof:
    name: Property And Stateful Lane
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install uv
        run: python -m pip install uv
      - name: Sync dev dependencies
        run: uv sync --python 3.12 --group dev
      - name: Run property and stateful lane
        run: ./scripts/test-brain-core.sh --lane proof

  fuzz-smoke:
    name: Fuzz Smoke Lane
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install uv
        run: python -m pip install uv
      - name: Sync dev dependencies
        run: uv sync --python 3.12 --group dev
      - name: Run fuzz smoke lane
        run: ./scripts/test-brain-core.sh --lane fuzz-smoke

  embodied-fast:
    name: Fast Embodied-Core Lane
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install uv
        run: python -m pip install uv
      - name: Sync dev dependencies
        run: uv sync --python 3.12 --group dev
      - name: Run embodied fast lane
        run: ./scripts/test-embodied-core.sh --lane fast

  atheris:
    name: Scheduled Atheris Lane
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install uv
        run: python -m pip install uv
      - name: Sync dev dependencies
        run: uv sync --python 3.12 --group dev
      - name: Run scheduled Atheris lane
        env:
          ATHERIS_RUNS: "200"
        run: ./scripts/test-brain-core.sh --lane atheris
